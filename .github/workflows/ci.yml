name: Crirced CI

on:
  push:
    branches: "*"

jobs:
  check-format:
    strategy:
      fail-fast: false
      matrix:
        crystal_version:
          - 1.17.1
        experimental:
          - false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: ${{ matrix.crystal_version }}
      - name: Format
        run: crystal tool format --check

  specs:
    strategy:
      fail-fast: false
      matrix:
        crystal_version:
          - 1.17.1
        experimental:
          - true
    runs-on: ubuntu-latest

    steps:
      - name: Configure sysctl limits
        run: |
          sudo swapoff -a
          sudo sysctl -w vm.swappiness=1
          sudo sysctl -w fs.file-max=262144
          sudo sysctl -w vm.max_map_count=262144

      # - uses: getong/elasticsearch-action@v1.2
      #   with:
      #     elasticsearch version: '8.1.2'
      #     host port: 9200
      #     container port: 9200
      #     host node port: 9300
      #     node port: 9300
          # discovery type: 'single-node'
      - uses: actions/checkout@v4
      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: ${{ matrix.crystal_version }}

      - name: Set up Crystal cache
        uses: actions/cache@v4
        id: crystal-cache
        with:
          path: |
            ~/.cache/crystal
            lib
          key: ${{ runner.os }}-crystal-${{ hashFiles('**/shard.lock') }}
          restore-keys: |
            ${{ runner.os }}-crystal-

      - name: Install shards
        if: steps.crystal-cache.outputs.cache-hit != 'true'
        run: shards check || shards install

      - name: Build test server
        run: crystal build src/circed.cr -o circed_test

      - name: Setup test environment
        run: |
          mkdir -p spec/fixtures/ssl
          mkdir -p spec/logs
          # Generate SSL certificates for testing
          bash spec/fixtures/generate_test_certs.sh

      - name: Run unit tests
        run: crystal spec spec/circed/

      - name: Run smoke test
        run: crystal spec spec/smoke_test_spec.cr

      - name: Run integration tests
        timeout-minutes: 5
        run: |
          # Kill any leftover processes from previous runs
          pkill -f 'circed_test' || true
          sleep 1
          # Run integration tests
          crystal spec spec/integration/

      - name: Cleanup
        if: always()
        run: |
          # Clean up any test processes
          pkill -f 'circed_test' || true
